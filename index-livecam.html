<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    body {
      position: fixed;
      inset: 0;
    }

    a-scene {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      background: transparent !important;
    }

    video, canvas {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
    }
  </style>
</head>
<body>

<a-scene
  mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.0001; filterBeta: 50; warmupTolerance: 8; missTolerance: 8;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights; alpha: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-assets>
    <video
      id="video"
      src="portret.mp4"
      preload="auto"
      muted
      playsinline
      webkit-playsinline
      crossorigin="anonymous">
    </video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="target" mindar-image-target="targetIndex: 0">
    <a-video
      id="portrait-video"
      src="#video"
      position="0 0 0.01"
      width="0.84"
      height="1.14"
      material="opacity: 0; transparent: true">
    </a-video>
  </a-entity>

</a-scene>

<script>
  const scene = document.querySelector("a-scene");
  const target = document.querySelector("#target");
  const video = document.querySelector("#video");
  const arVideo = document.querySelector("#portrait-video");

  let hasPlayedForCurrentDetection = false;

  scene.addEventListener("renderstart", () => {
    video.pause();
    video.currentTime = 0;
    arVideo.setAttribute("material", "opacity: 0; transparent: true");
  });

  target.addEventListener("targetFound", async () => {
    if (hasPlayedForCurrentDetection) return;

    hasPlayedForCurrentDetection = true;

    arVideo.removeAttribute("animation");
    arVideo.setAttribute("material", "opacity: 0; transparent: true");

    video.pause();
    video.currentTime = 0;

    try {
      await video.play();
    } catch (e) {
      console.log("Play failed:", e);
    }

    arVideo.setAttribute(
      "animation",
      "property: material.opacity; from: 0; to: 1; dur: 400; easing: easeOutQuad"
    );
  });

  target.addEventListener("targetLost", () => {
    hasPlayedForCurrentDetection = false;
    video.pause();
    video.currentTime = 0;
    arVideo.removeAttribute("animation");
    arVideo.setAttribute("material", "opacity: 0; transparent: true");
  });

  video.addEventListener("ended", () => {
    video.pause();
    video.currentTime = 0;
  });
</script>

</body>
</html>
